<!doctype html>
<html>
  <head>
    <title>Test Save Job</title>
  </head>
  <body>
    <h1>Test Firestore Save</h1>
    <button onclick="testSave()">Test Save</button>
    <div
      id="result"
      style="margin-top: 20px; padding: 10px; background: #f0f0f0"
    ></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>

    <script>
      async function testSave() {
        const resultDiv = document.getElementById("result");

        const user = auth.currentUser;

        if (!user) {
          resultDiv.innerHTML = "❌ No user logged in! Login first.";
          return;
        }

        resultDiv.innerHTML = "Testing save...";

        try {
          const docRef = await db.collection("savedJobs").add({
            userId: user.uid,
            userEmail: user.email,
            jobId: "test-job-123",
            title: "Test Job",
            company: "Test Company",
            location: "Remote",
            salary: "$100k",
            description: "This is a test job",
            url: "https://example.com",
            savedAt: firebase.firestore.FieldValue.serverTimestamp(),
          });

          resultDiv.innerHTML = "✅ SUCCESS! Job saved with ID: " + docRef.id;
          console.log("Saved successfully!");
        } catch (error) {
          resultDiv.innerHTML = "❌ Error: " + error.message;
          console.error("Save failed:", error);
        }
      }
    </script>
  </body>
</html>
