<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Dashboard - JobPortal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body class="dashboard-page">
    <!-- Animated Background -->
    <div class="dashboard-bg">
        <div class="dashboard-shapes">
            <div class="dashboard-shape dashboard-shape-1"></div>
            <div class="dashboard-shape dashboard-shape-2"></div>
            <div class="dashboard-shape dashboard-shape-3"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar-dashboard">
        <div class="container">
            <div class="navbar-content">
                <a href="index.html" class="logo-dashboard">
                    <div class="logo-icon">
                        <svg width="40" height="40" viewBox="0 0 40 40">
                            <defs>
                                <linearGradient id="dashLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <rect width="40" height="40" rx="10" fill="url(#dashLogoGrad)"/>
                            <path d="M20 10 L28 20 L20 30 L12 20 Z" fill="white"/>
                        </svg>
                    </div>
                    <span class="logo-text">JobPortal</span>
                </a>

                <div class="nav-links">
                    <a href="dashboard.html" class="nav-link active">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="7" height="7"></rect>
                            <rect x="14" y="3" width="7" height="7"></rect>
                            <rect x="14" y="14" width="7" height="7"></rect>
                            <rect x="3" y="14" width="7" height="7"></rect>
                        </svg>
                        Jobs
                    </a>
                    <a href="saved-jobs.html" class="nav-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                        Saved Jobs
                    </a>
                    <button id="logoutBtn" class="btn-logout">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="dashboard-main">
        <div class="container">
            <!-- Header Section -->
            <div class="dashboard-header">
                <div class="header-content">
                    <h1 class="dashboard-title">Discover Your Dream Job</h1>
                    <p class="dashboard-subtitle">Browse through thousands of job opportunities</p>
                </div>
            </div>

            <!-- Search & Filter Section -->
            <div class="search-section">
                <div class="search-glass-card">
                    <div class="search-grid">
                        <div class="search-input-wrapper">
                            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            <input type="text" id="searchInput" placeholder="Search jobs, companies, keywords...">
                        </div>

                        <div class="search-input-wrapper">
                            <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                                <circle cx="12" cy="10" r="3"></circle>
                            </svg>
                            <input type="text" id="locationInput" placeholder="Location...">
                        </div>

                        <button onclick="searchJobs()" class="btn-search">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                            Search
                        </button>
                    </div>
                </div>
            </div>

            <!-- Loading Spinner -->
            <div id="loadingSpinner" class="loading-spinner" style="display: none;">
                <div class="spinner"></div>
                <p>Loading amazing jobs...</p>
            </div>

            <!-- Jobs Grid -->
            <div id="jobsContainer" class="jobs-grid">
                <!-- Jobs will be dynamically inserted here -->
            </div>

            <!-- Pagination -->
            <div class="pagination-section">
                <div class="pagination-glass">
                    <button id="prevBtn" onclick="previousPage()" class="btn-pagination">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                        Previous
                    </button>
                    
                    <span id="pageInfo" class="page-info">Page 1 of 1</span>
                    
                    <button id="nextBtn" onclick="nextPage()" class="btn-pagination">
                        Next
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/jobs.js"></script>
</body>
</html>
