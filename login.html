<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JobPortal</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body class="auth-page">
    <!-- Animated Background -->
    <div class="auth-bg">
        <div class="auth-shapes">
            <div class="auth-shape auth-shape-1"></div>
            <div class="auth-shape auth-shape-2"></div>
            <div class="auth-shape auth-shape-3"></div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="navbar-auth">
        <div class="container">
            <a href="index.html" class="logo-auth">
                <div class="logo-icon">
                    <svg width="40" height="40" viewBox="0 0 40 40">
                        <defs>
                            <linearGradient id="authLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect width="40" height="40" rx="10" fill="url(#authLogoGrad)"/>
                        <path d="M20 10 L28 20 L20 30 L12 20 Z" fill="white"/>
                    </svg>
                </div>
                <span class="logo-text">JobPortal</span>
            </a>
        </div>
    </nav>

    <!-- Login Section - Centered -->
    <section class="auth-container-centered">
        <div class="container">
            <div class="auth-box-centered">
                <div class="auth-glass-card-centered">
                    <div class="auth-card-header">
                        <h2>Welcome Back!</h2>
                        <p>Sign in to your account</p>
                    </div>

                    <form id="loginForm" class="auth-form-modern">
                        <div class="form-group-modern">
                            <label for="loginEmail">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                                Email Address
                            </label>
                            <input type="email" id="loginEmail" placeholder="your@email.com" required>
                        </div>

                        <div class="form-group-modern">
                            <label for="loginPassword">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                                Password
                            </label>
                            <input type="password" id="loginPassword" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn-auth-primary">
                            <span>Sign In</span>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                                <polyline points="12 5 19 12 12 19"></polyline>
                            </svg>
                        </button>
                    </form>

                    <div class="auth-divider">
                        <span>Don't have an account?</span>
                    </div>

                    <a href="signup.html" class="btn-auth-secondary">
                        Create Account
                    </a>

                    <!-- Error Message -->
                    <div id="loginError" class="message-box error-box" style="display: none;"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Custom Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
